services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER:?PG_USER must be set in .env (see .env.example)}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD must be set in .env (see .env.example)}
      POSTGRES_DB: ${PG_DATABASE:?PG_DATABASE must be set in .env (see .env.example)}
    ports:
      - "5434:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/postgres-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/docker-init.sql:/docker-entrypoint-initdb.d/02-billing.sql
      - ./database/docker-init-companies.sh:/docker-entrypoint-initdb.d/03-companies.sh
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U horizon_spark -d horizon"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3070}:${PORT:-3070}"
      - "${HTTPS_PORT:-3513}:${HTTPS_PORT:-3513}"
    env_file:
      - .env
    environment:
      PG_HOST: ${PG_HOST:?PG_HOST must be set in .env (see .env.example)}
      PG_PORT: ${PG_PORT:?PG_PORT must be set in .env (see .env.example)}
      PG_DATABASE: ${PG_DATABASE:?PG_DATABASE must be set in .env (see .env.example)}
      PG_USER: ${PG_USER:?PG_USER must be set in .env (see .env.example)}
      PG_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD must be set in .env (see .env.example)}
      SENTRY_DSN_BACKEND: http://81de2477f74f468fabf764232a0c119a@glitchtip-web:8080/1
      PROMETHEUS_URL: http://prometheus:9090
      GRAFANA_URL: http://grafana:3000
      LOKI_URL: http://loki:3100
      GLITCHTIP_URL: http://glitchtip-web:8080
      # Keycloak shared-auth integration (cross-app SSO).
      # Comma-separated list — accepts tokens from BOTH dev (Spark) and prod
      # (AWS/keycloakprod) so the same VR instance serves PIDS-app on
      # app.horizonsparks.ai and meitec.horizonsparks.ai.
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:?KEYCLOAK_ISSUER must be set in .env (comma-separated list of trusted realms; see .env.example)}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:?KEYCLOAK_AUDIENCE must be set in .env (see .env.example)}
      KEYCLOAK_OIDC_CLIENT_ID: ${KEYCLOAK_OIDC_CLIENT_ID:?KEYCLOAK_OIDC_CLIENT_ID must be set in .env (see .env.example)}
      # KEYCLOAK_OIDC_CLIENT_SECRET set in .env (server-only secret)
      # COOKIE_DOMAIN set to .horizonsparks.ai once DNS unifies under that apex
    volumes:
      - uploads_audio:/app/audio
      - uploads_photos:/app/photos
      - uploads_msg_audio:/app/message-audio
      - uploads_msg_photos:/app/message-photos
      - ./cert.pem:/app/cert.pem:ro
      - ./key.pem:/app/key.pem:ro
    networks:
      - app-net
      - hasura-network
      - observability-network

networks:
  app-net:
    driver: bridge
  hasura-network:
    external: true
    name: hasura_app-network-hasura
  observability-network:
    external: true
    name: observability_observability

volumes:
  pg_data:
  uploads_audio:
  uploads_photos:
  uploads_msg_audio:
  uploads_msg_photos:
